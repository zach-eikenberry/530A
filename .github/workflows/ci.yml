name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (unit + property + coverage gates)
        run: pnpm test

      - name: Audit dependencies (high/critical fail)
        run: pnpm audit --audit-level high

      - name: Build
        run: pnpm build

  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Deploy to Cloudflare Pages (the owner's PERSONAL account) on green main.
  # Enabled once CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets exist —
  # those must point at the personal account, never any other account.
  deploy:
    name: Deploy (Cloudflare Pages)
    if: github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true'
    needs: [quality, gitleaks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish to Pages
        run: pnpm dlx wrangler pages deploy apps/web/dist --project-name=530a-model
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
